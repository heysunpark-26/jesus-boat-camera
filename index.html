<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>믿음의 항해 카메라</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        /* 화면 전체를 차지하는 9:16 비율의 프레임 뷰포트 */
        #app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            max-height: 888px; 
            background-color: #000;
            overflow: hidden;
        }
        /* 실시간 카메라 피드 */
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* 화면에 꽉 차게 */
            z-index: 1;
        }
        /* PNG 프레임 오버레이 */
        #frame-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill; /* 화면 왜곡 없이 프레임 전체가 무조건 채워지도록 설정 */
            pointer-events: none;
            z-index: 2;
        }
        /* UI 컨트롤러 */
        #controls {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 40px;
            z-index: 3;
        }
        #capture-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background-color: #fff;
            border: 5px solid rgba(255, 255, 255, 0.4);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #capture-btn:active {
            transform: scale(0.95);
        }
        #switch-btn {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
        canvas {
            display: none;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <video id="video" autoplay playsinline></video>
        <img id="frame-overlay" src="frame.png" alt="프레임">
        
        <div id="controls">
            <button id="switch-btn">🔄 전환</button>
            <button id="capture-btn"></button>
            <div style="width: 65px;"></div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const frame = document.getElementById('frame-overlay');
        const captureBtn = document.getElementById('capture-btn');
        const switchBtn = document.getElementById('switch-btn');
        const canvas = document.getElementById('canvas');

        let currentStream = null;
        let useFrontCamera = true;

        async function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            // 고해상도 세로 모드 타겟팅
            const constraints = {
                video: {
                    facingMode: useFrontCamera ? "user" : "environment",
                    width: { ideal: 1080 },
                    height: { ideal: 1920 }
                },
                audio: false
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
                video.style.transform = useFrontCamera ? "scaleX(-1)" : "scaleX(1)";
            } catch (error) {
                alert("카메라를 실행할 수 없습니다.");
            }
        }

        switchBtn.addEventListener('click', () => {
            useFrontCamera = !useFrontCamera;
            startCamera();
        });

        // 중요: 사진 찍을 때 잘림 현상 방지를 위해 캔버스 매핑 전면 수정
        captureBtn.addEventListener('click', () => {
            const ctx = canvas.getContext('2d');
            
            // 결과물 저장 해상도를 명확하게 9:16 (1080x1920 HD 화질)로 고정합니다.
            const targetWidth = 1080;
            const targetHeight = 1920;
            
            canvas.width = targetWidth;
            canvas.height = targetHeight;

            // [1단계] 배경 카메라 화면 그리기
            ctx.save();
            if (useFrontCamera) {
                ctx.translate(targetWidth, 0);
                ctx.scale(-1, 1);
            }

            // 카메라 영상의 실제 비율 계산
            const videoRatio = video.videoWidth / video.videoHeight;
            const targetRatio = targetWidth / targetHeight;

            let renderWidth, renderHeight, xOffset, yOffset;

            // 이미지가 캔버스 영역에 꽉 차도록(Cover) 계산
            if (videoRatio > targetRatio) {
                renderHeight = targetHeight;
                renderWidth = targetHeight * videoRatio;
                xOffset = (targetWidth - renderWidth) / 2;
                yOffset = 0;
            } else {
                renderWidth = targetWidth;
                renderHeight = targetWidth / videoRatio;
                xOffset = 0;
                yOffset = (targetHeight - renderHeight) / 2;
            }

            ctx.drawImage(video, xOffset, yOffset, renderWidth, renderHeight);
            ctx.restore();

            // [2단계] 그 위에 PNG 프레임을 '정확히 전체 크기'로 덮어쓰기 (잘림 원인 해결)
            ctx.drawImage(frame, 0, 0, targetWidth, targetHeight);

            // [3단계] 이미지 저장
            try {
                const dataUrl = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `faith_photo_${Date.now()}.png`;
                link.href = dataUrl;
                link.click();
            } catch (e) {
                alert("다운로드에 실패했습니다. 모바일 브라우저 환경을 확인해 주세요.");
            }
        });

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
